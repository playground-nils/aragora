# Gitleaks configuration for Aragora
# https://github.com/gitleaks/gitleaks

title = "Aragora Secret Scanning"

[extend]
# Use default rules
useDefault = true

# Global allowlist for paths and patterns
[allowlist]
description = "Global allowlist"
regexTarget = "match"
regexes = [
    '''sk-ant-test-.*''',
    '''your-.*-key''',
    '''your-api-key''',
    '''<your-.*>''',
    '''YOUR_.*''',
    # WebSocket RFC test nonce (base64 of "the sample nonce")
    '''dGhlIHNhbXBsZSBub25jZQ==''',
    # CI workflow test env vars (not real secrets)
    '''ARAGORA_JWT_SECRET=''',
    '''ARAGORA_SSO_CLIENT_SECRET=''',
    # Python variable reference (not a leaked credential)
    '''credentials=self\._sp_credentials''',
    # Agent spec comment (not a secret)
    '''provider=anthropic-api''',
    # LinkedIn error class import (not a client ID)
    '''LinkedInAdsError''',
    # Example key generation instructions
    '''Add private key to \.env''',
    # Discord example application ID
    '''DISCORD_APPLICATION_ID=''',
    # Provider readiness metadata tuples (env var identifiers + model names)
    '''"anthropic": \("ANTHROPIC_API_KEY", "claude-opus-4-5-20251101"\),''',
    '''"mistral": \("MISTRAL_API_KEY", "mistral-large-2512"\),''',
]
paths = [
    '''.*_test\.py$''',
    '''.*test_.*\.py$''',
    '''.*\.test\.ts$''',
    '''.*\.spec\.ts$''',
    '''.*\.example$''',
    '''.*\.template$''',
    '''\.env\.example$''',
    '''\.env\.local\.example$''',
    '''\.env\.template$''',
    '''docs/.*\.md$''',
    '''examples/.*\.md$''',
    '''marketplace/.*\.md$''',
    '''benchmarks/.*\.py$''',
    '''deploy/k8s/secret\.yaml$''',
    '''deploy/self-hosted/.*''',
    '''\.github/workflows/.*\.yml$''',
    '''scripts/sign_constitution\.py$''',
    '''aragora/agents/spec\.py$''',
    '''aragora/connectors/ecommerce/.*\.py$''',
    '''aragora/connectors/advertising/.*\.py$''',
    '''docs/status/generated/agt_e2e_trace\.json$''',
    '''scripts/agt_pipeline_dry_run\.py$''',
]
