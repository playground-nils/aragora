  - project_id: phase0a-010
    title: "Document campaign receipt enforcement mechanism"
    source_refs:
      - docs/plans/2026-03-10-bootstrap-plan.md
      - aragora/swarm/campaign.py
    spec:
      raw_goal: >
        Create docs/governance/receipt-enforcement.md describing how the
        campaign executor enforces receipt emission on terminal project
        transitions. Cover: (1) what triggers receipt emission (terminal
        statuses: completed, failed, blocked, skipped), (2) where receipts
        are stored (docs/receipts/{campaign_id}/{project_id}.yaml), (3) the
        three code paths that emit receipts (_apply_dispatch_result,
        _apply_review_result, _ready_projects), (4) the difference between
        authoritative receipts (executor-emitted) and audit notes
        (operator-backfilled), and (5) what happens if receipt emission fails
        (RuntimeError). Reference the receipt schema from the bootstrap plan.
        Keep it under 100 lines.
      refined_goal: >
        Write docs/governance/receipt-enforcement.md describing the receipt
        enforcement mechanism in aragora/swarm/campaign.py.
      acceptance_criteria:
        - "File docs/governance/receipt-enforcement.md exists"
        - "Describes terminal statuses that trigger receipts"
        - "Describes storage path pattern"
        - "Distinguishes authoritative receipts from audit notes"
        - "Describes failure behavior (RuntimeError)"
      constraints:
        - "Only create or modify files under docs/"
        - "Do not modify any Python source files"
    file_scope_hints:
