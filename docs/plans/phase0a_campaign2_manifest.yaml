# Phase 0A Campaign 2: 10 governance tasks through the swarm
#
# Exit gate requirement: 10 consecutive tasks completed without manual rescue.
# Campaign 1 produced 0 credited executions (all required rescue).
# Campaign 2 must deliver all 10.
#
# Preconditions:
# 1. B-0 (worker SIGPIPE fix) verified via proof task
# 2. Receipt emission implemented and tested
# 3. Proof task (phase0a-proof/proof-001) completed successfully
#
# All tasks are documentation/governance ONLY — no source code changes.

campaign_id: phase0a-campaign2
created_at: "2026-03-10T23:30:00+00:00"
source_kind: manual
source_ref: docs/plans/2026-03-10-bootstrap-plan.md
planner_model: claude
worker_model: codex
review_model: claude
max_parallel_ready_projects: 1
max_retries_per_project: 2
budget_limit_usd: 20.0
time_limit_hours: 4.0

projects:
  - project_id: phase0a-006
    title: "Document duplicate subsystem resolution plan"
    source_refs:
      - docs/governance/subsystem-ledger.md
    spec:
      raw_goal: >
        Create docs/governance/duplicate-subsystem-resolution.md documenting
        a resolution plan for the 6 duplicate subsystem clusters identified in
        the subsystem ledger. For each cluster (event dispatch, storage,
        resilience, scheduling, knowledge/memory, security), describe: which
        modules are duplicates, which should be the canonical survivor, what
        the migration path looks like, and which phase (0B, 1, or 2) should
        handle the consolidation. Reference the subsystem ledger clusters.
        Keep it under 150 lines.
      refined_goal: >
        Write docs/governance/duplicate-subsystem-resolution.md with a
        resolution plan for all 6 duplicate subsystem clusters.
      acceptance_criteria:
        - "File docs/governance/duplicate-subsystem-resolution.md exists"
        - "All 6 duplicate clusters from subsystem-ledger.md are addressed"
        - "Each cluster has: canonical survivor, migration path, target phase"
      constraints:
        - "Only create or modify files under docs/"
        - "Do not modify any Python source files"
    file_scope_hints:
      - docs/governance/duplicate-subsystem-resolution.md
    acceptance_criteria:
      - "File exists and is valid markdown"
      - "No source code files modified"
    constraints:
      - "Documentation only — no code changes"
    estimated_cost_usd: 1.50
    status: pending

