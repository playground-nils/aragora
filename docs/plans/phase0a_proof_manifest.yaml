# Phase 0A Proof Task Manifest
# Single governance-only task to validate the full swarm pipeline end-to-end.
# Success criteria: worker dispatches, produces a file, auto-commits, deliverable
# extracted, review passes, receipt emitted at terminal transition.
#
# This manifest must complete without manual rescue before Campaign 2 begins.

campaign_id: phase0a-proof
created_at: "2026-03-10T23:00:00+00:00"
source_kind: manual
source_ref: docs/plans/2026-03-10-bootstrap-plan.md
planner_model: claude
worker_model: codex
review_model: claude
max_parallel_ready_projects: 1
max_retries_per_project: 1
budget_limit_usd: 3.0
time_limit_hours: 1.0

projects:
  - project_id: proof-001
    title: "Document campaign receipt enforcement mechanism"
    source_refs:
      - docs/plans/2026-03-10-bootstrap-plan.md
    spec:
      raw_goal: >
        Create a short governance document at docs/governance/receipt-enforcement.md
        that describes how the campaign executor enforces receipt emission on terminal
        project transitions. The document should cover: (1) what triggers receipt
        emission (terminal statuses: completed, failed, blocked, skipped), (2) where
        receipts are stored (docs/receipts/{campaign_id}/{project_id}.yaml), (3) the
        difference between authoritative receipts (executor-emitted) and audit notes
        (operator-backfilled), and (4) what happens if receipt emission fails (RuntimeError,
        campaign executor halts). Reference the receipt schema from the bootstrap plan.
        Keep it under 100 lines. Do not modify any source code files.
      refined_goal: >
        Write docs/governance/receipt-enforcement.md describing the receipt enforcement
        mechanism implemented in aragora/swarm/campaign.py. Cover trigger conditions,
        storage path, authoritative vs audit distinction, and failure semantics.
      acceptance_criteria:
        - "File docs/governance/receipt-enforcement.md exists and is valid markdown"
        - "Document describes terminal statuses that trigger receipt emission"
        - "Document describes receipt storage path pattern"
        - "Document distinguishes authoritative receipts from audit notes"
        - "Document describes failure behavior (RuntimeError)"
        - "Document is under 100 lines"
        - "No source code files are modified"
      constraints:
        - "Only create or modify files under docs/"
        - "Do not modify any Python source files"
        - "Do not modify any existing governance documents"
        - "Keep the document factual and concise"
    file_scope_hints:
      - docs/governance/receipt-enforcement.md
    acceptance_criteria:
      - "File docs/governance/receipt-enforcement.md exists"
      - "No source code files modified"
    constraints:
      - "Documentation only — no code changes"
    estimated_cost_usd: 1.50
    status: pending
