# Phase 0B Engine Hardening Campaign Manifest
#
# Campaign target: execute the engine hardening backlog under the same
# supervised swarm path validated in Phase 0A, with sequential dependency
# gating and human approval required at merge time.

campaign_id: phase0b-engine-hardening
created_at: "2026-03-13T00:00:00+00:00"
source_kind: manual
source_ref: docs/plans/2026-03-10-bootstrap-plan.md
planner_model: claude
worker_model: codex
review_model: claude
max_parallel_ready_projects: 1
max_retries_per_project: 2
budget_limit_usd: 75.0
time_limit_hours: 48.0

projects:
  - project_id: B-1
    title: "Circuit breaker per worker type"
    source_refs:
      - docs/plans/2026-03-10-bootstrap-plan.md
    spec:
      raw_goal: >
        Implement per-worker-type circuit breaker behavior so repeated launch
        or execution failures for one worker type stop new dispatches for that
        worker type until the supervisor records the breaker state and recovery
        path. Scope is limited to worker launch and supervision flow.
      refined_goal: >
        Add worker-type-specific circuit breaker handling in the swarm launcher
        and supervisor so repeated failures are contained instead of cascading.
      acceptance_criteria:
        - "Repeated failures for a single worker type trip a circuit breaker for that worker type"
        - "Supervisor records breaker state and avoids dispatching blocked worker types"
        - "Recovery path exists for resetting or expiring the breaker state"
        - "Behavior is covered by automated tests for launch and supervisor flows"
      constraints:
        - "Merge gate always enabled"
        - "Human approval required for every merge"
        - "Cost and budget caps enforced"
        - "Truth-suite lane required for merge eligibility"
    file_scope_hints:
      - aragora/swarm/worker_launcher.py
      - aragora/swarm/supervisor.py
    acceptance_criteria:
      - "Circuit breaker behavior implemented for worker-type-specific failures"
      - "Tests cover breaker trip and recovery paths"
    estimated_cost_usd: 4.00
    status: pending

  - project_id: B-2
    title: "Failure escalation and ticket recovery"
    source_refs:
      - docs/plans/2026-03-10-bootstrap-plan.md
    spec:
      raw_goal: >
        Implement failure escalation and ticket recovery semantics so campaign
        execution can escalate stuck or failed tickets into explicit terminal or
        recoverable states without silent loss of work. Scope is supervisor and
        campaign coordination behavior.
      refined_goal: >
        Add explicit failure escalation and ticket recovery flow across the
        swarm supervisor and campaign executor.
      acceptance_criteria:
        - "Supervisor escalates repeated or terminal worker failures into explicit campaign-visible states"
        - "Campaign state supports recovery or requeue behavior for eligible tickets"
        - "Escalation path preserves ticket auditability and avoids silent drops"
        - "Behavior is covered by automated tests for supervisor and campaign state transitions"
      constraints:
        - "Merge gate always enabled"
        - "Human approval required for every merge"
        - "Cost and budget caps enforced"
        - "Truth-suite lane required for merge eligibility"
    file_scope_hints:
      - aragora/swarm/supervisor.py
      - aragora/swarm/campaign.py
    acceptance_criteria:
      - "Failure escalation path implemented"
      - "Recoverable tickets can be re-entered into campaign flow"
    estimated_cost_usd: 4.00
    status: pending

  - project_id: B-3
    title: "Budget controls enforcement"
    source_refs:
      - docs/plans/2026-03-10-bootstrap-plan.md
    spec:
      raw_goal: >
        Enforce campaign and orchestration budget controls so execution halts or
        escalates before exceeding configured cost limits. Scope includes
        hardened orchestration and campaign budget accounting.
      refined_goal: >
        Implement hard budget enforcement in the hardened orchestrator and
        campaign execution path.
      acceptance_criteria:
        - "Configured budget caps are checked before and during execution"
        - "Execution halts or escalates before budget overrun occurs"
        - "Budget accounting remains visible to campaign state and review flows"
        - "Behavior is covered by automated tests for cap enforcement and escalation"
      constraints:
        - "Merge gate always enabled"
        - "Human approval required for every merge"
        - "Cost and budget caps enforced"
        - "Truth-suite lane required for merge eligibility"
    file_scope_hints:
      - aragora/nomic/hardened_orchestrator.py
      - aragora/swarm/campaign.py
    acceptance_criteria:
      - "Budget caps enforced at orchestration and campaign layers"
      - "Tests cover halt or escalation on budget pressure"
    estimated_cost_usd: 4.00
    status: pending

  - project_id: B-4
    title: "Deadlock detection"
    source_refs:
      - docs/plans/2026-03-10-bootstrap-plan.md
    spec:
      raw_goal: >
        Detect campaign deadlocks where work can no longer make forward progress
        because dependencies, reconciliation state, or terminal transitions have
        stalled. Scope includes reconciler and campaign readiness logic.
      refined_goal: >
        Add deadlock detection and surfacing across reconciler and campaign
        scheduling logic.
      acceptance_criteria:
        - "Deadlocked campaign or reconciliation states are detected explicitly"
        - "Deadlock detection surfaces actionable status instead of indefinite waiting"
        - "Campaign state distinguishes deadlock from normal queued or blocked work"
        - "Behavior is covered by automated tests for stalled dependency and reconciliation scenarios"
      constraints:
        - "Merge gate always enabled"
        - "Human approval required for every merge"
        - "Cost and budget caps enforced"
        - "Truth-suite lane required for merge eligibility"
    file_scope_hints:
      - aragora/swarm/reconciler.py
      - aragora/swarm/campaign.py
    acceptance_criteria:
      - "Deadlocks are detected and surfaced to campaign control flow"
      - "Tests cover representative stalled-state scenarios"
    estimated_cost_usd: 4.00
    status: pending

  - project_id: B-5
    title: "Merge gate with test execution"
    source_refs:
      - docs/plans/2026-03-10-bootstrap-plan.md
    spec:
      raw_goal: >
        Add a merge gate that requires relevant test execution before a swarm
        code-change task is considered merge-eligible. Scope covers supervisor
        merge flow and worker launcher support for running required checks.
      refined_goal: >
        Enforce test-executing merge gates in swarm supervision and worker
        launch paths.
      acceptance_criteria:
        - "Merge eligibility requires successful execution of required tests or checks"
        - "Supervisor blocks merge progression when required tests have not passed"
        - "Worker launcher can invoke the expected verification path for merge gating"
        - "Behavior is covered by automated tests for merge gate pass and fail cases"
      constraints:
        - "Merge gate always enabled"
        - "Human approval required for every merge"
        - "Cost and budget caps enforced"
        - "Truth-suite lane required for merge eligibility"
    file_scope_hints:
      - aragora/swarm/supervisor.py
      - aragora/swarm/worker_launcher.py
    acceptance_criteria:
      - "Required tests run before merge eligibility is granted"
      - "Tests cover both successful and blocked merge paths"
    estimated_cost_usd: 5.00
    status: pending

  - project_id: B-6
    title: "Enable quality gates by default"
    source_refs:
      - docs/plans/2026-03-10-bootstrap-plan.md
    spec:
      raw_goal: >
        Change hardened orchestrator defaults so quality gates are enabled by
        default, reducing reliance on opt-in safety configuration for swarm
        code-change execution.
      refined_goal: >
        Make quality gates the default behavior in the hardened orchestrator.
      acceptance_criteria:
        - "Quality gates are enabled by default in the hardened orchestrator"
        - "Opt-out behavior, if any, is explicit and auditable"
        - "Default execution path aligns with required merge and truth-suite checks"
        - "Behavior is covered by automated tests for default configuration handling"
      constraints:
        - "Merge gate always enabled"
        - "Human approval required for every merge"
        - "Cost and budget caps enforced"
        - "Truth-suite lane required for merge eligibility"
    file_scope_hints:
      - aragora/nomic/hardened_orchestrator.py
    acceptance_criteria:
      - "Quality gates default to enabled"
      - "Tests cover default and explicit override behavior"
    estimated_cost_usd: 3.00
    status: pending

  - project_id: B-7
    title: "End-to-end swarm integration test"
    source_refs:
      - docs/plans/2026-03-10-bootstrap-plan.md
    dependencies:
      - project_id: B-1
        reason: "sequential_dependency"
      - project_id: B-2
        reason: "sequential_dependency"
      - project_id: B-3
        reason: "sequential_dependency"
      - project_id: B-4
        reason: "sequential_dependency"
      - project_id: B-5
        reason: "sequential_dependency"
      - project_id: B-6
        reason: "sequential_dependency"
    spec:
      raw_goal: >
        Add an end-to-end swarm integration test that exercises the Phase 0B
        hardening path together: worker launch resilience, escalation, budget
        enforcement, deadlock detection, merge gating, and default quality
        gates. The test should validate the engine can verify and control its
        own code-change execution path under supervision.
      refined_goal: >
        Write an end-to-end swarm integration test that covers the Phase 0B
        hardening behaviors after B-1 through B-6 land.
      acceptance_criteria:
        - "Integration test covers the hardened swarm execution path end to end"
        - "Test asserts failure handling, budget enforcement, deadlock handling, merge gating, and quality gate defaults"
        - "Test depends on B-1 through B-6 and runs only after those prerequisites are complete"
        - "Test is stable enough to serve as a merge-eligibility signal"
      constraints:
        - "Merge gate always enabled"
        - "Human approval required for every merge"
        - "Cost and budget caps enforced"
        - "Truth-suite lane required for merge eligibility"
    file_scope_hints:
      - aragora/swarm/campaign.py
      - tests/swarm/test_campaign.py
    acceptance_criteria:
      - "End-to-end integration coverage exists for Phase 0B hardening behaviors"
      - "B-7 is dependency-gated on B-1 through B-6"
    estimated_cost_usd: 6.00
    status: pending
