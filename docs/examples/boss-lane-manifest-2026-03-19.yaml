      convention: codex/<swarm-fix-or-live-proof>
    worktree:
      convention: .worktrees/codex-auto/<session-id>
    allowed_write_scope:
      - aragora/swarm/**
      - aragora/swarm/worker_launcher.py
      - tests/swarm/**
