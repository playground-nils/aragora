name: Self-Hosted Shadow CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - 'sdk/typescript/**'
      - 'aragora/agents/**'
      - 'aragora/cli/**'
      - 'aragora/core.py'
      - 'aragora/demo/**'
      - 'tests/cli/test_offline_golden_path.py'
      - 'scripts/ci_install_project.sh'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - '.github/workflows/self-hosted-shadow.yml'
      - '.github/actions/pr-scope-classifier/**'
      - '.github/actions/setup-node-safe/**'
      - '.github/actions/setup-python-safe/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: self-hosted-shadow-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scope:
    name: Shadow Scope
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      run_shadow: ${{ steps.decision.outputs.run_shadow }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: repo

      - uses: ./repo/.github/actions/pr-scope-classifier
        id: scope

      - name: Decide shadow scope
        id: decision
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "run_shadow=${{ steps.scope.outputs.self_host_shadow }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_shadow=true" >> "$GITHUB_OUTPUT"
          fi

  mac-sdk-typecheck-shadow:
    name: Mac TypeScript SDK Shadow
    if: (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && needs.scope.outputs.run_shadow == 'true'
    runs-on:
      - self-hosted
      - aragora
      - macOS
      - ARM64
      - mac-studio
    timeout-minutes: 10
    needs: scope
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: repo

      - uses: ./repo/.github/actions/checkout-integrity
        with:
          checkout-path: repo

      - name: Set up Node.js
        uses: ./repo/.github/actions/setup-node-safe
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: repo/sdk/typescript/package-lock.json

      - name: Runner fingerprint
        shell: bash
        run: |
          echo "runner_name=${RUNNER_NAME}"
          echo "runner_os=${RUNNER_OS}"
          echo "runner_arch=${RUNNER_ARCH}"
          uname -a
          sw_vers
          node --version
          npm --version

      - name: Install TypeScript SDK dependencies
        shell: bash
        working-directory: repo/sdk/typescript
        run: |
          npm ci

      - name: Run TypeScript SDK typecheck
        shell: bash
        working-directory: repo/sdk/typescript
        run: |
          npm run typecheck

  hetzner-offline-golden-path-shadow:
    name: Hetzner Offline Golden Path Shadow
    if: (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && needs.scope.outputs.run_shadow == 'true'
    runs-on:
      - self-hosted
      - aragora
      - Linux
      - X64
      - hetzner
    timeout-minutes: 15
    needs: scope
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: repo

      - uses: ./repo/.github/actions/checkout-integrity
        with:
          checkout-path: repo

      - name: Set up Python
        uses: ./repo/.github/actions/setup-python-safe
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        working-directory: repo
        env:
          ARAGORA_CI_SKIP_HEAVY_ML_TEST_DEPS: "1"
        run: |
          python -m pip install --upgrade pip
          bash scripts/ci_install_project.sh --extras dev,test

      - name: Run offline golden path
        shell: bash
        working-directory: repo
        env:
          PYTHONPATH: .
          PYTHONWARNINGS: "error::ResourceWarning"
        run: |
          python -m pytest tests/cli/test_offline_golden_path.py -v --timeout=60 --tb=short \
            -W error::ResourceWarning \
            -W error::pytest.PytestUnraisableExceptionWarning
