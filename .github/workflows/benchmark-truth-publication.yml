name: Benchmark Truth Publication

on:
  schedule:
    - cron: "20 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: benchmark-truth-publication
  cancel-in-progress: false

jobs:
  publish-benchmark-truth:
    runs-on: aragora
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Setup Python
        uses: ./.github/actions/setup-python-safe
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install -e ".[dev]" --quiet 2>/dev/null || python -m pip install -e . --quiet

      - name: Install GitHub CLI
        shell: bash
        run: |
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) gh_arch="amd64" ;;
            aarch64|arm64) gh_arch="arm64" ;;
            *)
              echo "::error::Unsupported architecture for gh install: $arch"
              exit 1
              ;;
          esac
          gh_version="$(
            curl -fsSL https://api.github.com/repos/cli/cli/releases/latest |
              python3 -c 'import json, sys; print(json.load(sys.stdin)["tag_name"].lstrip("v"))'
          )"
          gh_root="$RUNNER_TEMP/gh-cli"
          archive="gh_${gh_version}_linux_${gh_arch}.tar.gz"
          mkdir -p "$gh_root"
          curl -fsSL "https://github.com/cli/cli/releases/download/v${gh_version}/${archive}" |
            tar -xz -C "$gh_root"
          echo "$gh_root/gh_${gh_version}_linux_${gh_arch}/bin" >> "$GITHUB_PATH"

      - name: Verify runtime prerequisites
        shell: bash
        run: |
          command -v gh >/dev/null
          METRICS_PATH=".aragora/overnight/boss_metrics.jsonl"
          mkdir -p "$(dirname "$METRICS_PATH")"
          if [[ ! -f "$METRICS_PATH" ]]; then
            echo "::notice::No repo-local benchmark metrics snapshot found; recurrence will generate a fresh window"
          fi

      - name: Refresh execution-verified Codex runner
        shell: bash
        run: |
          RUNNER_REPORT="$RUNNER_TEMP/codex-runner-maintain.json"
          python3 -m aragora.cli.main swarm runner maintain \
            --runner-type codex \
            --probe-limit 1 \
            --json > "$RUNNER_REPORT"
          python3 - "$RUNNER_REPORT" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          summary = payload.get("summary") or {}
          if int(summary.get("passed", 0) or 0) < 1:
              raise SystemExit(
                  "No Codex runner probe passed during benchmark publication setup."
              )

          routing = payload.get("routing_after") or {}
          selected = [
              item
              for item in routing.get("selected_runners", [])
              if isinstance(item, dict)
          ]
          verified = [
              item
              for item in selected
              if str(item.get("runner_type", "")).strip() == "codex"
              and str(item.get("probe_status", "")).strip() == "passed"
          ]
          if not verified:
              raise SystemExit(
                  "No execution-verified Codex runner selected after refresh."
              )
          PY

      - name: Refresh recurring benchmark corpus metrics
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/run_benchmark_corpus_recurrence.py \
            --repo synaptent/aragora

      - name: Publish tracked trust-loop surfaces
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/measure_b0_scorecard.py \
            --publish \
            --publish-dir docs/status/generated/benchmark_scorecards \
            --truth-publish-dir docs/status/generated/benchmark_truth_artifacts \
            --fail-incomplete

          python3 scripts/render_benchmark_truth_status.py \
            --output docs/status/B0_BENCHMARK_TRUTH_STATUS.md

          python3 scripts/publish_rescue_productization_report.py \
            --publish-dir docs/status/generated/rescue_productization \
            --productization-map docs/benchmarks/rescue_productization.json \
            --ensure-issues \
            --repo synaptent/aragora

          python3 scripts/render_rescue_productization_status.py \
            --report-root docs/status/generated/rescue_productization \
            --output docs/status/TW03_RESCUE_PRODUCTIZATION_STATUS.md

      - name: Publish workflow summary
        run: |
          cat docs/status/B0_BENCHMARK_TRUTH_STATUS.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat docs/status/TW03_RESCUE_PRODUCTIZATION_STATUS.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push refreshed trust-loop surfaces
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/benchmarks/rescue_productization.json \
            docs/status/B0_BENCHMARK_TRUTH_STATUS.md \
            docs/status/TW03_RESCUE_PRODUCTIZATION_STATUS.md \
            docs/status/generated/benchmark_scorecards \
            docs/status/generated/benchmark_truth_artifacts \
            docs/status/generated/rescue_productization

          if git diff --cached --quiet; then
            echo "No recurring trust-loop surface changes to commit."
            exit 0
          fi

          git commit -m "docs(status): refresh recurring trust-loop surfaces [skip ci]"
          git push origin HEAD:main
