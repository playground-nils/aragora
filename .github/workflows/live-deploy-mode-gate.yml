name: Live Deploy Mode Gate
'on':
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    - ready_for_review
    paths:
    - aragora/live/**
    - .github/workflows/live-deploy-mode-gate.yml
    - .github/workflows/deploy-frontend.yml
    - .github/workflows/deploy-secure.yml
  schedule:
  - cron: 55 1 * * *
  workflow_dispatch: null
permissions:
  contents: read
concurrency:
  group: live-deploy-mode-gate-${{ github.event_name == 'pull_request' && github.event.pull_request.number
    || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  scope:
    name: Live Deploy Scope
    runs-on: ubuntu-latest
    outputs:
      deploy_relevant: ${{ steps.defaults.outputs.deploy_relevant || steps.filter.outputs.deploy_relevant
        }}
    steps:
    - name: Default scope (non-PR)
      if: github.event_name != 'pull_request'
      id: defaults
      run: echo "deploy_relevant=true" >> "$GITHUB_OUTPUT"
    - name: Checkout
      if: github.event_name == 'pull_request'
      uses: actions/checkout@v4
    - name: Detect deploy-impacting frontend changes
      if: github.event_name == 'pull_request'
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: "deploy_relevant:\n  - 'aragora/live/package*.json'\n  - 'aragora/live/next.config.*'\n\
          \  - 'aragora/live/tsconfig*.json'\n  - 'aragora/live/playwright*.config.*'\n\
          \  - 'aragora/live/e2e/**'\n  - 'aragora/live/functions/**'\n  - 'aragora/live/public/**'\n\
          \  - 'aragora/live/scripts/**'\n  - 'aragora/live/src/api/**'\n  - 'aragora/live/src/app/**'\n\
          \  - 'aragora/live/src/components/**'\n  - 'aragora/live/src/context/**'\n\
          \  - 'aragora/live/src/hooks/**'\n  - 'aragora/live/src/lib/**'\n  - 'aragora/live/src/store/**'\n\
          \  - 'aragora/live/src/styles/**'\n  - 'aragora/live/src/utils/**'\n  -\
          \ '.github/workflows/live-deploy-mode-gate.yml'\n  - '.github/workflows/deploy-frontend.yml'\n\
          \  - '.github/workflows/deploy-secure.yml'\n"
    - name: Skip reason
      if: github.event_name == 'pull_request' && steps.filter.outputs.deploy_relevant
        != 'true'
      run: 'echo "No deploy-impacting frontend files changed; skipping self-hosted
        live deploy mode gate."

        '
  gate:
    needs: scope
    if: (github.event_name != 'pull_request' || !github.event.pull_request.draft)
      && (github.event_name != 'pull_request' || needs.scope.outputs.deploy_relevant
      == 'true')
    name: Validate Live Deploy Mode
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_VERSION: '20'
      LIVE_DEPLOY_MODE: ${{ vars.LIVE_DEPLOY_MODE }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Verify checkout integrity
      shell: bash
      run: "if [[ ! -f pyproject.toml ]]; then\n  echo \"::warning::pyproject.toml\
        \ missing after checkout; attempting recovery\"\n  git sparse-checkout disable\
        \ || true\n  git fetch --no-tags origin \"${GITHUB_SHA:-HEAD}\"\n  git reset\
        \ --hard FETCH_HEAD\n  git clean -ffd || true\nfi\nif [[ ! -f pyproject.toml\
        \ ]]; then\n  echo \"::warning::Standard recovery failed; attempting archive\
        \ restore\"\n  find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {}\
        \ +\n  git archive \"${GITHUB_SHA:-HEAD}\" | tar -x || git archive HEAD |\
        \ tar -x\nfi\nif [[ ! -f pyproject.toml ]]; then\n  echo \"::error::Repository\
        \ checkout is incomplete (pyproject.toml missing)\"\n  echo \"PWD=$(pwd)\"\
        \n  ls -la\n  exit 1\nfi\n"
    - name: Resolve deploy mode
      id: mode
      run: "MODE=\"${LIVE_DEPLOY_MODE:-runtime}\"\nif [ \"$MODE\" != \"runtime\" ]\
        \ && [ \"$MODE\" != \"export\" ]; then\n  echo \"::error::LIVE_DEPLOY_MODE\
        \ must be 'runtime' or 'export' (got '$MODE')\"\n  exit 1\nfi\necho \"mode=$MODE\"\
        \ >> \"$GITHUB_OUTPUT\"\necho \"Resolved LIVE_DEPLOY_MODE=$MODE\"\n"
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: aragora/live/package-lock.json
    - name: Install dependencies
      working-directory: aragora/live
      run: npm ci
    - name: Runtime mode checks
      if: steps.mode.outputs.mode == 'runtime'
      working-directory: aragora/live
      run: "npx tsc --noEmit\nnpm run build\nif command -v apt-get >/dev/null 2>&1;\
        \ then\n  npx playwright install --with-deps chromium\nelse\n  echo \"::notice::apt-get\
        \ unavailable on runner; installing Chromium without OS package bootstrap\"\
        \n  npx playwright install chromium\nfi\nnpx playwright test \\\n  e2e/debate-viewing.spec.ts\
        \ \\\n  e2e/debate-intervention-live.spec.ts \\\n  e2e/websocket.spec.ts \\\
        \n  --project=chromium \\\n  --workers=1\n"
    - name: Export mode checks
      if: steps.mode.outputs.mode == 'export'
      working-directory: aragora/live
      run: "if rg -n \"export const dynamicParams = true\" src/app; then\n  echo \"\
        ::error::dynamicParams=true is incompatible with output: export\"\n  exit\
        \ 1\nfi\nnpm run build:export\n"
