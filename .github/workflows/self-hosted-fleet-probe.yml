name: Self-Hosted Fleet Probe

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/self-hosted-fleet-probe.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: self-hosted-fleet-probe-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  mac-studio-probe:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Mac Studio Probe
    runs-on:
      - self-hosted
      - aragora
      - macOS
      - ARM64
      - mac-studio
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: probe-repo

      - name: Runner fingerprint
        shell: bash
        run: |
          echo "runner_name=${RUNNER_NAME}"
          echo "runner_os=${RUNNER_OS}"
          echo "runner_arch=${RUNNER_ARCH}"
          uname -a
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
          if command -v python3 >/dev/null 2>&1; then
            echo "python3=$(command -v python3)"
            python3 --version
          else
            echo "::warning::python3 missing on PATH"
          fi
          if command -v node >/dev/null 2>&1; then
            echo "node=$(command -v node)"
            node --version
          else
            echo "::warning::node missing on PATH"
          fi

      - name: Repo smoke
        shell: bash
        run: |
          cd probe-repo
          test -f pyproject.toml
          test -f scripts/check_version_alignment.py
          test -f aragora/__version__.py
          git rev-parse --short HEAD
          python3 - <<'PY'
          from pathlib import Path
          assert Path("pyproject.toml").is_file()
          assert Path("scripts/check_version_alignment.py").is_file()
          assert Path("aragora/__version__.py").is_file()
          print("workspace_smoke=ok")
          PY

  hetzner-probe:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Hetzner Probe
    runs-on:
      - self-hosted
      - aragora
      - Linux
      - X64
      - hetzner
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: probe-repo

      - name: Runner fingerprint
        shell: bash
        run: |
          echo "runner_name=${RUNNER_NAME}"
          echo "runner_os=${RUNNER_OS}"
          echo "runner_arch=${RUNNER_ARCH}"
          uname -a
          if command -v python3 >/dev/null 2>&1; then
            echo "python3=$(command -v python3)"
            python3 --version
          else
            echo "::warning::python3 missing on PATH"
          fi
          if command -v node >/dev/null 2>&1; then
            echo "node=$(command -v node)"
            node --version
          else
            echo "::warning::node missing on PATH"
          fi
          (lsb_release -a || cat /etc/os-release) 2>/dev/null || true

      - name: Repo smoke
        shell: bash
        run: |
          cd probe-repo
          test -f pyproject.toml
          test -f scripts/check_version_alignment.py
          test -f aragora/__version__.py
          git rev-parse --short HEAD
          python3 - <<'PY'
          from pathlib import Path
          assert Path("pyproject.toml").is_file()
          assert Path("scripts/check_version_alignment.py").is_file()
          assert Path("aragora/__version__.py").is_file()
          print("workspace_smoke=ok")
          PY
