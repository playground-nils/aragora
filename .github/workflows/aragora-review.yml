# .github/workflows/aragora-review.yml
name: Aragora Code Review (Manual)

on:
  workflow_dispatch:

concurrency:
  group: aragora-review-manual-${{ github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Manual workflow retired for PR-triggered review
        run: |
          echo "The required Aragora PR review context is produced only by .github/workflows/aragora-review-gate.yml."
          echo "This manual workflow remains non-PR-triggered to avoid duplicate review contexts."
