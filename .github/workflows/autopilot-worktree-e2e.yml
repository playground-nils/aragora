name: Autopilot Worktree E2E

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - 'aragora/server/handlers/self_improve.py'
      - 'aragora/worktree/**'
      - 'scripts/codex_worktree_autopilot.py'
      - 'tests/handlers/test_self_improve_api.py'
      - 'pyproject.toml'
      - '.github/workflows/autopilot-worktree-e2e.yml'
      - '.github/actions/pr-scope-classifier/**'
  workflow_dispatch:

concurrency:
  group: autopilot-worktree-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  scope:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Autopilot Scope
    runs-on: ubuntu-latest
    outputs:
      run_autopilot: ${{ steps.decision.outputs.run_autopilot }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Detect autopilot-relevant changes
        id: scope-filter
        uses: ./.github/actions/pr-scope-classifier

      - name: Decide autopilot scope
        id: decision
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "run_autopilot=${{ steps.scope-filter.outputs.autopilot }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_autopilot=true" >> "$GITHUB_OUTPUT"
          fi

  autopilot-api-e2e:
    name: Autopilot API E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: scope
    if: (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (github.event_name != 'pull_request' || needs.scope.outputs.run_autopilot == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout integrity
        shell: bash
        run: |
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::pyproject.toml missing after checkout; attempting recovery"
            git sparse-checkout disable || true
            git fetch --no-tags origin "${GITHUB_SHA:-HEAD}"
            git reset --hard FETCH_HEAD
            git clean -ffd || true
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::warning::Standard recovery failed; attempting archive restore"
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            git archive "${GITHUB_SHA:-HEAD}" | tar -x || git archive HEAD | tar -x
          fi
          if [[ ! -f pyproject.toml ]]; then
            echo "::error::Repository checkout is incomplete (pyproject.toml missing)"
            echo "PWD=$(pwd)"
            ls -la
            exit 1
          fi

      - name: Set up Python
        uses: ./.github/actions/setup-python-safe
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          bash scripts/ci_install_project.sh --extras dev,test

      - name: Run autopilot API end-to-end test
        env:
          PYTHONPATH: .
        run: |
          pytest -q tests/handlers/test_self_improve_api.py::TestAutopilotWorktreesE2E::test_ensure_reconcile_maintain_flow \
            --timeout=180 --tb=short
